# Пример: веб-интерфейс настроек на отдельном домене (например tg.example.com) с защитой паролем.
# 1) Создайте файл паролей: sudo htpasswd -c /etc/nginx/.htpasswd_telegram_monitor admin
# 2) Скопируйте этот файл в /etc/nginx/conf.d/ или sites-enabled, замените YOUR_DOMAIN и пути.
# 3) Получите SSL: certbot certonly --webroot -w /usr/share/nginx/html -d YOUR_DOMAIN

server {
    listen 80;
    server_name YOUR_DOMAIN;
    location ~ /\.well-known/acme-challenge/ {
        allow all;
        root /usr/share/nginx/html;
        try_files $uri =404;
    }
    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl;
    server_name YOUR_DOMAIN;

    ssl_certificate     /etc/letsencrypt/live/YOUR_DOMAIN/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/YOUR_DOMAIN/privkey.pem;

    root /var/www/telegram-bot;   # каталог с index.php и webhook.php
    index index.php;

    # Защита паролем на уровне Nginx (обязательно для интерфейса настроек)
    auth_basic "Settings";
    auth_basic_user_file /etc/nginx/.htpasswd_telegram_monitor;

    location ~ \.php$ {
        include fastcgi_params;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        fastcgi_pass unix:/run/php-fpm/www.sock;
        fastcgi_read_timeout 30;
    }
    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }
}
