# Пример конфигурации Nginx для Telegram webhook.
# Замените YOUR_DOMAIN, /path/to/telegram-bot и пути к SSL-сертификатам.

# Редирект HTTP -> HTTPS
server {
    listen 80;
    server_name YOUR_DOMAIN;
    location ~ /\.well-known/acme-challenge/ {
        allow all;
        default_type "text/plain";
        root /usr/share/nginx/html;
        try_files $uri =404;
    }
    location / {
        return 301 https://$host$request_uri;
    }
}

# HTTPS — только webhook
server {
    listen 443 ssl;
    server_name YOUR_DOMAIN;

    ssl_certificate     /etc/letsencrypt/live/YOUR_DOMAIN/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/YOUR_DOMAIN/privkey.pem;
    # include /etc/nginx/snippets/ssl_params.conf;  # если есть

    root /path/to/telegram-bot;   # каталог с webhook.php
    index webhook.php;

    location = /webhook.php {
        include fastcgi_params;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        fastcgi_pass unix:/run/php-fpm/www.sock;   # или 127.0.0.1:9000
        fastcgi_read_timeout 30;
    }
    location / {
        return 404;
    }
}
